<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第２回子育て応援マルシェ 領収書発行システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro', 'Yu Gothic', 'メイリオ', sans-serif; background: #f5f5f5; }
  .container { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
  h1 { text-align: center; font-size: 20px; font-weight: 500; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #ddd; padding: 1.5rem; margin-bottom: 1rem; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
  select, input[type=password] {
    width: 100%; padding: 9px 12px; font-size: 15px;
    border: 1px solid #ccc; border-radius: 8px;
    background: #fff; color: #111; margin-bottom: 1rem;
    font-family: inherit;
  }
  .btn {
    width: 100%; padding: 11px; font-size: 15px; font-weight: 500;
    border: 1px solid #ccc; border-radius: 8px;
    background: #f0f0f0; color: #111; cursor: pointer; font-family: inherit;
  }
  .btn:hover { background: #e0e0e0; }
  .btn-print { background: #185FA5; color: #fff; border-color: #185FA5; margin-bottom: 8px; }
  .btn-print:hover { background: #0C447C; }
  .btn-back { background: #f0f0f0; color: #111; }
  .err { color: #c0392b; font-size: 13px; margin-top: -8px; margin-bottom: 12px; display: none; }

  /* 領収書 */
  .receipt { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 2rem 2.5rem; color: #111; margin-bottom: 1rem; }
  .receipt-title { text-align: center; font-size: 26px; font-weight: 700; letter-spacing: 0.25em; border-bottom: 2.5px solid #111; padding-bottom: 0.6rem; margin-bottom: 0.5rem; }
  .receipt-date { text-align: right; font-size: 13px; color: #444; margin-bottom: 1rem; }
  .atena-row { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 0.5rem; }
  .atena-name { font-size: 22px; font-weight: 700; border-bottom: 1.5px solid #111; flex: 1; padding-bottom: 2px; }
  .atena-sama { font-size: 18px; font-weight: 500; }
  .kin-row { background: #f8f8f8; border: 1px solid #ddd; border-radius: 6px; padding: 0.65rem 1rem; display: flex; align-items: center; justify-content: space-between; margin: 0.75rem 0; }
  .kin-label { font-size: 13px; color: #555; }
  .kin-amount { font-size: 24px; font-weight: 700; }
  .tadashi { font-size: 13px; color: #555; margin-bottom: 0.4rem; }
  .tadashi span { color: #111; font-size: 14px; }
  .issuer-section { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1.2rem; border-top: 1px solid #ddd; padding-top: 1rem; }
  .issuer-name { font-size: 13px; font-weight: 500; line-height: 1.9; text-align: right; }
  .inkan { width: 80px; height: 80px; flex-shrink: 0; }

  .hidden { display: none; }

  @media print {
    body { background: #fff; }
    .container { max-width: 100%; margin: 0; padding: 0; }
    .no-print { display: none !important; }
    .receipt { border: none; border-radius: 0; padding: 1cm 1.5cm; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ログイン画面 -->
  <div id="loginScreen">
    <h1>第２回子育て応援マルシェ</h1>
    <p class="subtitle">領収書発行システム</p>
    <div class="card">
      <label>店舗名を選択してください</label>
      <select id="shopSelect"><option value="">-- 選択してください --</option></select>
      <label>パスワード</label>
      <input type="password" id="pwInput" placeholder="4桁のパスワード" maxlength="4">
      <div id="errMsg" class="err"></div>
      <button class="btn btn-print" onclick="doLogin()">領収書を表示する</button>
    </div>
  </div>

  <!-- 領収書画面 -->
  <div id="receiptScreen" class="hidden">
    <div class="receipt" id="receiptBody">
      <div class="receipt-title">領　収　書</div>
      <div class="receipt-date">発行日：令和９年１月１７日</div>

        <div class="atena-name" id="rAtena"></div>
        <div class="atena-sama">様</div>
      </div>
      <div class="kin-row">
        <div class="kin-label">金　額</div>
        <div class="kin-amount" id="rAmount"></div>
      </div>

      <div class="issuer-section">
